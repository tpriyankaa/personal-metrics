<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Priyanka</title>
  <!-- Chart.js Library Required By Your Script -->
  <script src="https://jsdelivr.net"></script>
  <style>
    :root {
      --bg-color: #050505;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-purple: #7B61FF;
      --secondary-purple: #5B3DF5;
      --text-main: #FFFFFF;
      --text-muted: #A5A5A5;
      --success-green: #34D399;
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --sidebar-width: 260px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-family);
      line-height: 1.5;
      overflow-x: hidden;
      background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 0);
      background-size: 24px 24px;
      display: flex;
      min-height: 100vh;
    }

    /* Soft background decorative layout glows */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123, 97, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      pointer-events: none;
    }
    body::before { top: -100px; left: calc(var(--sidebar-width) - 100px); }
    body::after { bottom: -100px; right: -100px; }

    /* Navigation Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--card-border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
    }

    /* Main Core Layout Context Panel */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      width: calc(100% - var(--sidebar-width));
      padding: 2rem 3rem;
    }

    /* Responsive adjustments for layouts */
    @media (max-width: 1024px) {
      .sidebar { width: 80px; padding: 2rem 0.5rem; align-items: center; }
      .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 2rem 1.5rem; }
    }

    /* Glassmorphism utility card rules */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
    }

    /* Hero Layout Base with Vector Area Mappings */
    .hero {
      background: linear-gradient(135deg, var(--secondary-purple), var(--primary-purple));
      border-radius: 20px;
      padding: 2.5rem 320px 2.5rem 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
      min-height: 220px;
      box-shadow: 0 10px 40px rgba(91, 61, 245, 0.25);
    }

    /* Target statistics grids grid system layout maps */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat-card { display: flex; flex-direction: column; gap: 0.25rem; }
    .stat-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.6rem; font-weight: 700; }

    .grid-main-layout {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 1200px) {
      .grid-main-layout { grid-template-columns: 1fr 1fr; }
      .grid-main-layout > :first-child { grid-column: span 2; }
    }
    @media (max-width: 768px) {
      .grid-main-layout { grid-template-columns: 1fr; }
      .grid-main-layout > :first-child { grid-column: span 1; }
      .hero { padding: 2rem; }
    }

    /* Chart wrappers styling elements mapping definitions */
    .chart-container-bar { position: relative; height: 280px; width: 100%; }
    .chart-container-round { position: relative; height: 200px; width: 100%; margin: 1rem 0; }

    /* Activity timelines styling rules */
    .timeline { display: flex; flex-direction: column; gap: 1.15rem; position: relative; padding-left: 0.5rem; }
    .timeline::before { content: ''; position: absolute; left: 3px; top: 8px; bottom: 8px; width: 2px; background: var(--card-border); }
    .timeline-item { position: relative; padding-left: 1.25rem; }
    .timeline-marker { position: absolute; left: -2px; top: 6px; width: 12px; height: 12px; border-radius: 50%; background: var(--success-green); box-shadow: 0 0 8px var(--success-green); }
    .timeline-content h4 { font-size: 0.9rem; font-weight: 600; }
    .timeline-content span { font-size: 0.75rem; color: var(--text-muted); }

    /* Layout structure maps for report systems segment widgets */
    .reports-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
    .report-card { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; }
    .report-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(123, 97, 255, 0.1); display: flex; align-items: center; justify-content: center; color: var(--primary-purple); }
    .report-title { font-size: 0.9rem; font-weight: 600; }

    .grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .goal-item { margin-bottom: 1rem; }
    .goal-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .progress-bar-bg { background: rgba(255, 255, 255, 0.08); border-radius: 6px; height: 6px; overflow: hidden; }
    .progress-bar-fill { background: linear-gradient(90deg, var(--secondary-purple), var(--primary-purple)); height: 100%; border-radius: 6px; }

    .task-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem; background: rgba(255, 255, 255, 0.02); border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }
  </style>
</head>
<body>

  <!-- Navigation Sidebar (Target container linked into JavaScript script layout injection points) -->
  <nav class="sidebar" id="sidebar-nav-container"></nav>

  <!-- Main View Container -->
  <main class="main-content">
    
    <!-- Hero Component Section (Target container linked into JavaScript illustration engine insertion markers) -->
    <header class="hero" id="hero-widget-container"></header>

    <!-- Quick Performance Matrix Layout Cards -->
    <section class="stats-grid">
      <div class="glass-card stat-card">
        <span class="stat-label">🔥 Current Streak</span>
        <span class="stat-value">12 Days</span>
      </div>
      <div class="glass-card stat-card">
        <span class="stat-label">📂 Active Projects</span>
        <span class="stat-value">5</span>
      </div>
      <div class="glass-card stat-card">
        <span class="stat-label">✅ Tasks Completed</span>
        <span class="stat-value" style="color: var(--success-green);">84%</span>
      </div>
      <div class="glass-card stat-card">
        <span class="stat-label">🎯 Weekly Goal</span>
        <span class="stat-value" style="color: var(--primary-purple);">On Track</span>
      </div>
    </section>

    <!-- Main Dynamic Interface Layout Segment Modules Grid Systems mapping -->
    <div class="grid-main-layout">
      
      <!-- Interactive Performance Bar Chart Graph Metrics Container Widget -->
      <section class="glass-card">
        <div style="margin-bottom: 1rem;">
          <h2 style="font-size: 1.25rem; font-weight: 700;">Performance Analytics</h2>
        </div>
        <div class="chart-container-bar">
          <canvas id="performanceChart"></canvas>
        </div>
      </section>

      <!-- Work Allocation Round Doughnut Chart Graph Container Widget Segment -->
      <section class="glass-card" style="display: flex; flex-direction: column; align-items: center;">
        <div style="align-self: flex-start; margin-bottom: 1rem;">
          <h2 style="font-size: 1.25rem; font-weight: 700;">Work Allocation</h2>
        </div>
        <div class="chart-container-round">
          <canvas id="roundAllocationChart"></canvas>
        </div>
      </section>

      <!-- Recent Timeline Activity Monitor Section Element Frame -->
      <section class="glass-card">
        <div style="margin-bottom: 1rem;">
          <h2 style="font-size: 1.25rem; font-weight: 700;">Recent Activity</h2>
        </div>
        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-marker"></div>
            <div class="timeline-content">
              <h4>Portfolio Updated</h4>
              <span>2 hours ago</span>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-marker"></div>
            <div class="timeline-content">
              <h4>JavaScript Practice</h4>
              <span>Yesterday</span>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-marker"></div>
            <div class="timeline-content">
              <h4>README Improved</h4>
              <span>2 days ago</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Reports Hub Component Area Elements Layout Setup Matrix Structure Mapping -->
    <section style="margin-bottom: 2.5rem;">
      <div style="margin-bottom: 1rem;">
        <h2 style="font-size: 1.25rem; font-weight: 700;">Reports & Insights</h2>
      </div>
      <div class="reports-grid">
      </div>
    </section>
  </main>
  <script src="code.js"></script>
</body>
</html>
